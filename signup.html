<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <title>Enterprise Registration — Attendant Corporate Support</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#0D1B2A', secondary: '#F9F7F4', accentGold: '#B8964E', darkBg: '#070F1A', darkSurface: '#0D1B2E', darkCard: '#102035', darkText: '#F0EDE8', },
                    fontFamily: { cormorant: ['Cormorant Garamond', 'serif'], outfit: ['Outfit', 'sans-serif'], },
                }
            }
        }
    </script>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .auth-bg {
            --auth-overlay-start: rgba(7, 15, 26, 0.95);
            --auth-overlay-end: rgba(7, 15, 26, 0.7);
            --auth-text: #F0EDE8;
            --auth-muted: rgba(240, 237, 232, 0.62);
            --auth-weak: rgba(240, 237, 232, 0.36);
            --auth-border: rgba(184, 150, 78, 0.22);
            --auth-surface: rgba(255, 255, 255, 0.05);
            --auth-surface-hover: rgba(255, 255, 255, 0.1);
            --auth-card-bg: rgba(13, 27, 46, 0.9);
            background-image: linear-gradient(to right, var(--auth-overlay-start), var(--auth-overlay-end)), url('https://images.unsplash.com/photo-1541746972996-4e0b0f43e02a?w=1600&q=80');
            background-size: cover;
            background-position: center;
        }

        [data-theme="light"] .auth-bg {
            --auth-overlay-start: rgba(249, 247, 244, 0.94);
            --auth-overlay-end: rgba(249, 247, 244, 0.68);
            --auth-text: #0D1B2A;
            --auth-muted: rgba(13, 27, 42, 0.64);
            --auth-weak: rgba(13, 27, 42, 0.42);
            --auth-border: rgba(13, 27, 42, 0.2);
            --auth-surface: rgba(13, 27, 42, 0.05);
            --auth-surface-hover: rgba(13, 27, 42, 0.1);
            --auth-card-bg: rgba(249, 247, 244, 0.9);
        }

        .auth-controls {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            z-index: 50;
        }

        [dir="rtl"] .auth-controls {
            right: auto;
            left: 1.5rem;
        }

        .auth-control-btn {
            color: var(--auth-muted);
        }

        .auth-control-btn:hover {
            color: #B8964E;
        }

        .auth-card {
            background-color: var(--auth-card-bg) !important;
            border-color: var(--auth-border) !important;
            color: var(--auth-text);
        }

        .auth-brand-text {
            color: var(--auth-text) !important;
        }

        .auth-social-btn {
            background-color: var(--auth-surface) !important;
            border-color: var(--auth-border) !important;
            color: var(--auth-muted) !important;
        }

        .auth-social-btn:hover {
            background-color: var(--auth-surface-hover) !important;
            border-color: #B8964E !important;
            color: var(--auth-text) !important;
        }

        .auth-divider {
            color: var(--auth-weak) !important;
        }

        .auth-divider-line {
            background-color: var(--auth-border) !important;
        }

        .auth-input {
            background-color: var(--auth-surface) !important;
            border-color: var(--auth-border) !important;
            color: var(--auth-text) !important;
        }

        .auth-input::placeholder {
            color: var(--auth-muted) !important;
        }

        .auth-select {
            background-color: var(--auth-surface) !important;
            border-color: var(--auth-border) !important;
            color: var(--auth-text) !important;
        }

        .auth-check {
            border-color: var(--auth-border) !important;
            background-color: var(--auth-surface) !important;
        }

        .auth-muted {
            color: var(--auth-muted) !important;
        }
    </style>
</head>

<body
    class="auth-page font-outfit antialiased bg-darkBg text-darkText min-h-screen flex items-center justify-center p-4 auth-bg transition-colors duration-300">
    <div class="auth-controls">
        <button class="theme-toggle auth-control-btn w-6 h-6 p-0 transition-colors" aria-label="Toggle Theme">
            <svg class="sun-icon w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 2.75v2.5m0 13.5v2.5M5.815 5.815l1.768 1.768m8.834 8.834 1.768 1.768M2.75 12h2.5m13.5 0h2.5M5.815 18.185l1.768-1.768m8.834-8.834 1.768-1.768M12 16a4 4 0 100-8 4 4 0 000 8z"/></svg>
            <svg class="moon-icon w-6 h-6 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12.8A9 9 0 1111.2 3a7 7 0 009.8 9.8z"/></svg>
        </button>
        <button class="rtl-toggle auth-control-btn w-6 h-6 font-bold text-xs" aria-label="Toggle RTL">RTL</button>
    </div>
    <div
        class="auth-card w-full max-w-lg bg-darkSurface/90 p-12 lg:p-16 border border-accentGold/20 backdrop-blur-xl reveal rounded-sm shadow-2xl relative">
        <div
            class="absolute top-0 left-0 w-32 h-32 bg-accentGold/5 -translate-y-16 -translate-x-16 rotate-45 pointer-events-none">
        </div>

        <header class="text-center mb-16">
            <a href="index.html" class="mb-6 inline-flex items-center justify-center gap-2 group">
                <div class="w-10 h-10 border-2 border-accentGold rounded-sm flex items-center justify-center transform group-hover:rotate-12 transition-transform duration-300">
                    <svg class="w-6 h-6 text-accentGold" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M6 14a6 6 0 1112 0v1H6v-1zm6 7a2 2 0 002-2h-4a2 2 0 002 2zm-8-6h16"></path>
                    </svg>
                </div>
                <span class="auth-brand-text font-cormorant text-2xl font-bold tracking-tight text-darkText uppercase">Attendant</span>
            </a>
            <h1
                class="font-cormorant text-3xl font-semibold opacity-60 italic mb-4 tracking-tight leading-none leading-tight leading-tight leading-loose leading-tight leading-tight leading-tight">
                Become an Attendant Partner.</h1>
            <p class="text-[10px] font-bold uppercase tracking-[0.2em] opacity-40 italic">Apply for a pilot node or full
                enterprise deployment today.</p>
        </header>

        <form action="#" class="space-y-12">
            <div class="space-y-4">
                <div class="grid grid-cols-4 gap-3">
                    <a href="#" aria-label="Continue with Apple"
                        class="auth-social-btn flex items-center justify-center gap-2 rounded-sm border border-white/10 bg-white/5 px-4 py-3 text-white/80 transition-all hover:border-accentGold hover:bg-white/10 hover:text-white">
                        <svg class="h-5 w-5" viewBox="0 0 24 24" aria-hidden="true">
                            <path fill="currentColor" d="M16.37 12.33c.02 2.44 2.14 3.26 2.16 3.27-.02.06-.34 1.2-1.14 2.38-.69 1.02-1.4 2.03-2.53 2.05-1.11.02-1.47-.66-2.74-.66-1.27 0-1.67.64-2.71.68-1.09.04-1.93-1.1-2.62-2.11-1.42-2.06-2.51-5.83-1.05-8.36.73-1.26 2.04-2.07 3.46-2.09 1.08-.02 2.1.73 2.74.73.64 0 1.83-.9 3.08-.77.52.02 1.97.21 2.9 1.58-.08.05-1.74 1.01-1.73 3.3zM14.5 6.16c.58-.72.98-1.73.87-2.73-.84.03-1.88.57-2.49 1.29-.55.64-1.03 1.67-.9 2.66.95.07 1.94-.48 2.52-1.22z"/>
                        </svg>
                        <span class="sr-only">Apple</span>
                    </a>
                    <a href="#" aria-label="Continue with Google"
                        class="auth-social-btn flex items-center justify-center gap-2 rounded-sm border border-white/10 bg-white/5 px-4 py-3 text-white/80 transition-all hover:border-accentGold hover:bg-white/10 hover:text-white">
                        <svg class="h-5 w-5" viewBox="0 0 24 24" aria-hidden="true">
                            <path fill="#EA4335" d="M12 10.2v3.9h5.5c-.2 1.3-1.5 3.9-5.5 3.9-3.3 0-6-2.8-6-6.2s2.7-6.2 6-6.2c1.9 0 3.1.8 3.8 1.5l2.6-2.5C16.8 3 14.7 2 12 2 6.9 2 2.8 6.3 2.8 11.7S6.9 21.3 12 21.3c6.9 0 8.6-4.9 8.6-7.4 0-.5 0-.9-.1-1.2H12z"/>
                        </svg>
                        <span class="sr-only">Google</span>
                    </a>
                    <a href="#" aria-label="Continue with Facebook"
                        class="auth-social-btn flex items-center justify-center gap-2 rounded-sm border border-white/10 bg-white/5 px-4 py-3 text-white/80 transition-all hover:border-accentGold hover:bg-white/10 hover:text-white">
                        <svg class="h-5 w-5" viewBox="0 0 24 24" aria-hidden="true">
                            <path fill="#1877F2" d="M24 12.1C24 5.4 18.6 0 12 0S0 5.4 0 12.1c0 6 4.4 11 10.1 12v-8.4H7.1v-3.6h3V9.3c0-3 1.8-4.7 4.5-4.7 1.3 0 2.7.2 2.7.2v3h-1.5c-1.5 0-2 .9-2 1.9v2.3h3.4l-.5 3.6h-2.9v8.4C19.6 23.1 24 18.1 24 12.1z"/>
                        </svg>
                        <span class="sr-only">Facebook</span>
                    </a>
                    <a href="#" aria-label="Continue with LinkedIn"
                        class="auth-social-btn flex items-center justify-center gap-2 rounded-sm border border-white/10 bg-white/5 px-4 py-3 text-white/80 transition-all hover:border-accentGold hover:bg-white/10 hover:text-white">
                        <svg class="h-5 w-5" viewBox="0 0 24 24" aria-hidden="true">
                            <path fill="#0A66C2" d="M20.45 20.45h-3.56v-5.58c0-1.33-.03-3.05-1.86-3.05-1.87 0-2.15 1.45-2.15 2.95v5.68H9.32V9h3.42v1.56h.05c.48-.9 1.64-1.86 3.37-1.86 3.6 0 4.27 2.37 4.27 5.46v6.29zM5.3 7.43a2.07 2.07 0 110-4.14 2.07 2.07 0 010 4.14zM7.08 20.45H3.52V9h3.56v11.45z"/>
                        </svg>
                        <span class="sr-only">LinkedIn</span>
                    </a>
                </div>
                <div class="auth-divider flex items-center gap-4 text-[10px] font-bold uppercase tracking-[0.2em] text-white/30">
                    <span class="auth-divider-line h-px flex-1 bg-white/10"></span>
                    <span>Or use work details</span>
                    <span class="auth-divider-line h-px flex-1 bg-white/10"></span>
                </div>
            </div>

            <div class="grid grid-cols-1 gap-8 text-left">
                <div class="relative group">
                    <label
                        class="text-[9px] font-bold uppercase tracking-widest text-[#B8964E] mb-2 block transition-all group-focus-within:text-white">Full
                        Identity</label>
                    <input type="text"
                        class="auth-input w-full bg-white/5 border-b border-white/10 py-3 text-sm focus:border-accentGold focus:outline-none focus:bg-white/10 transition-all rounded-sm px-2 placeholder:text-white/20"
                        placeholder="e.g. Elena Petrova" required>
                </div>
                <div class="relative group">
                    <label
                        class="text-[9px] font-bold uppercase tracking-widest text-[#B8964E] mb-2 block transition-all group-focus-within:text-white">Work
                        Liaison Email</label>
                    <input type="email"
                        class="auth-input w-full bg-white/5 border-b border-white/10 py-3 text-sm focus:border-accentGold focus:outline-none focus:bg-white/10 transition-all rounded-sm px-2 placeholder:text-white/20"
                        placeholder="e.g. e.petrova@meridian.com" required>
                </div>
            </div>

            <div class="grid grid-cols-1 gap-8 text-left">
                <div class="relative group">
                    <label
                        class="text-[9px] font-bold uppercase tracking-widest text-[#B8964E] mb-2 block transition-all group-focus-within:text-white">Corporate
                        Entity</label>
                    <input type="text"
                        class="auth-input w-full bg-white/5 border-b border-white/10 py-3 text-sm focus:border-accentGold focus:outline-none focus:bg-white/10 transition-all rounded-sm px-2 placeholder:text-white/20"
                        placeholder="e.g. Meridian Group" required>
                </div>
                <div class="relative group">
                    <label
                        class="text-[9px] font-bold uppercase tracking-widest text-[#B8964E] mb-2 block transition-all group-focus-within:text-white">Employee
                        Count</label>
                    <select
                        class="auth-select w-full bg-darkSurface border-b border-white/10 py-3 text-sm focus:border-accentGold focus:outline-none focus:bg-white/10 transition-all rounded-sm px-2 appearance-none">
                        <option>25-50 Employees</option>
                        <option>50-250 Employees</option>
                        <option>250-1,000 Employees</option>
                        <option>1,000+ Global Employees</option>
                    </select>
                </div>
            </div>

            <div
                class="auth-muted flex items-start gap-4 text-[10px] font-bold uppercase tracking-widest text-white/40 leading-relaxed cursor-pointer group">
                <input type="checkbox" id="nda"
                    class="auth-check w-4 h-4 bg-white/5 border border-white/10 focus:ring-accentGold focus:ring-offset-darkSurface focus:ring-1 appearance-none checked:bg-accentGold">
                <label for="nda" class="group-hover:text-white transition-colors">I accept the preliminary NDA and GDPR
                    compliance framework required for organizational auditing.</label>
            </div>

            <button type="submit"
                class="btn-primary btn-gold-shimmer w-full py-5 text-xs md:text-sm font-bold uppercase tracking-widest md:tracking-[0.2em]">Apply
                for Partner Access</button>

            <div class="mt-8 pt-8 border-t border-white/5 text-center">
                <p class="text-[10px] uppercase font-bold tracking-widest opacity-40">Already have a node key?</p>
                <a href="login.html"
                    class="text-[10px] uppercase font-bold tracking-widest text-accentGold mt-2 inline-block border-b border-accentGold/20 hover:border-accentGold transition-all">Sign
                    In to Dashboard →</a>
            </div>
        </form>

        <footer class="auth-muted mt-16 text-center text-[10px] font-bold uppercase tracking-[0.3em] opacity-20 select-none">
            TRUSTED BY MERIDIAN, VANTAGE & AETHER</footer>
    </div>
    <script src="assets/js/main.js"></script>
</body>

</html>
